<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style2.css">
</head>
<body>
    <header class="header">
        <a class="go_back" href="../html/index.html">Вернуться на главную</a>
    </header>
    <main class="main">
        <div class="modal_win">
            <div class="modal_win_main">
            <div class="modal_win_wrapper">
                <div class="modal_win_content">
                    <button class="close_modal_win">Close</button>
                        <div class="title-text">
                            <h1 class="name_game"></h1>
                        </div>
                        <div class="switch">
                            <button class="min_equipment">Минимальное <img class="img_choice_min" src="https://cdn-icons-png.flaticon.com/128/1442/1442912.png"></button>
                            <button class="recommended_equipment">Рекомендуемое <img class="img_choice_rec" src="https://cdn-icons-png.flaticon.com/128/1442/1442912.png"></button>
                        </div>
                        <div class="img_cart">
                            <img class="img_game" src="">
                        </div>
                        <div class="content_text">
                            <i class="game_text"></i>
                        </div>
                        <div class="fps_info">
                            <h2>Fps при настройках</h2>
                            <div class="table_fps">
                            <h3>Низкии</h3>
                            <p class="productivityLow"></p>
                            <h3>Средние</h3>
                            <p class="productivityMedium"></p>  
                            <h3>Высокие</h3>
                            <p class="productivityHigh"></p>
                            <h3>Макс</h3>
                            <p class="productivityMax"></p>
                            </div>
                        </div>
                        <div class="content_table">
                            <div class="table">
                                <img src="https://edelws.ru/local/templates/main/img/icon/vga.svg">
                                <p class="name_accessories">Видео-карта</p>
                                <p class="version_accessories card"></p>
                                
                                <img src="https://edelws.ru/local/templates/main/img/icon/cpu.svg">
                                <p class="name_accessories">Процессор</p>
                                <p class="version_accessories processor"></p>

                                
                                <img src="https://edelws.ru/local/templates/main/img/icon/ram.svg">
                                <p class="name_accessories">Оперативная память</p>
                                <p class="version_accessories access"></p>


                                <img src="https://edelws.ru/local/templates/main/img/icon/motherboard.svg">
                                <p class="name_accessories">Материнская плата</p>
                                <p class="version_accessories motherBoard"></p>

                                
                                <img src="https://edelws.ru/local/templates/main/img/icon/ssd.svg">
                                <p class="name_accessories">Диск SSD</p>
                                <p class="version_accessories ssd"></p>

                                
                                <img src="https://edelws.ru/local/templates/main/img/icon/power-supply.svg">
                                <p class="name_accessories">Блок питания</p>
                                <p class="version_accessories powerUnit"></p>

    
                                <img src="https://edelws.ru/local/templates/main/img/icon/case.svg">
                                <p class="name_accessories">Корпус</p>
                                <p class="version_accessories body"></p>

                            </div>
                        </div>
                        </div>
                        <!--  -->
                    </div>
                </div>
            </div>
        <!-- game slaider -->
        <!-- <section class="game_slaider">
            <div class="game_slaider_wrapper">
                <div class="game_slaider_content">
                </div>
            </div>
        </section> -->
        <!-- game list -->
        <section class="game_list">
            <div class="dame_list_wrapper">
                <div class="game_info">
                    <!-- GTA5 -->
                    <div class="game">
                        <div class="btn_cont">
                            <button class="nav-btn prev_btn"> < </button>
                            <button class="nav-btn next_btn"> > </button>
                        </div>
                        <div class="game_screen">
                        <div class="game_screen_slaider">
                            <img src="https://newcdn.igromania.ru/mnt/articles/2/0/6/5/d/2/29710/preview/595cc35973e05536_original.jpg" alt="game_screen">
                            <img src="https://avatars.mds.yandex.net/i?id=d7d2127a4ef3bd3a55605485b0ceb125_l-8819521-images-thumbs&n=13" alt="game_screen">                                                      
                        </div>
                    </div>
                        <p class="game_name">Grand Theft Auto 5</p>
                        <button id="gta5" class="open_modal">Смотреть комплектующие</button>
                    </div>
                    <!-- GTA6 -->
                    <div class="game">
                        <div class="btn_cont">
                            <button class="nav-btn prev_btn"> < </button>
                            <button class="nav-btn next_btn"> > </button>
                        </div>
                        <div class="game_screen">
                        <div class="game_screen_slaider">
                            <img src="https://i.playground.ru/e/preeCeThsgUS-rJ1PD_3yg.jpeg" alt="game_screen">
                            <img src="https://i.ytimg.com/vi/d407rA3ghIo/maxresdefault.jpg" alt="game_screen">                                                    
                        </div></div>
                        <p class="game_name">Grand Theft Auto 6</p>
                        <button id="gta6" class="open_modal">Смотреть комплектующие</button>
                    </div>
                    <!-- CS2 -->
                    <div class="game">
                        <div class="btn_cont">
                            <button class="nav-btn prev_btn"> < </button>
                            <button class="nav-btn next_btn"> > </button>
                        </div>
                        <div class="game_screen">
                        <div class="game_screen_slaider">
                            <!-- <img src="https://gfn.am/en/games/media/images/art_image-counter-strike-2-33f0e090.original.jpg" alt="game_screen"> -->
                            <img src="https://royal-computers.ru/upload/thumbs/podborpages/default/cs2_65c340.jpg" alt="game_screen">                            
                            <img src="https://i.ytimg.com/vi/B3kwB17NIF8/maxresdefault.jpg" alt="game_screen">                                                   
                        </div></div>
                        <p class="game_name">Counter-Strike 2</p>
                        <button id="CS2" class="open_modal">Смотреть комплектующие</button>
                    </div>
                    <!-- Dota 2 -->
                    <div class="game">
                        <div class="btn_cont">
                            <button class="nav-btn prev_btn"> < </button>
                            <button class="nav-btn next_btn"> > </button>
                        </div>
                        <div class="game_screen">
                        <div class="game_screen_slaider">
                            <img src="https://i.playground.ru/p/K78_zR49gEb4zx-zjbsp9w.jpeg" alt="game_screen">
                            <img src="https://i.playground.ru/e/hcodPvQZNAEArJGrp9iitw.jpeg" alt="game_screen">                            
                            <!-- <img src="" alt="game_screen">                             -->
                        </div>
                    </div>
                        <p class="game_name">Dota 2</p>
                        <button id="dota2" class="open_modal">Смотреть комплектующие</button>
                    </div>
                    
                </div>
            </div>
        </section>
    </main>
</body>
</html>
<script src="../js/modal_win2.js"></script>
